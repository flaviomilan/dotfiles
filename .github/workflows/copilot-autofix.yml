name: Copilot Auto-fix

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  shellcheck-autofix:
    name: Auto-fix ShellCheck warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck and capture fixable issues
        id: check
        continue-on-error: true
        run: |
          ISSUES=$(find . -name '*.sh' \
            -not -path './configs/zsh/.zsh/*' \
            -not -path './configs/tools/.tools/*' \
            -not -path './configs/neovim/*' \
            | xargs shellcheck --severity=warning --format=json 2>/dev/null || true)

          COUNT=$(echo "$ISSUES" | jq 'length // 0' 2>/dev/null || echo "0")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          if [[ "$COUNT" -gt 0 ]]; then
            echo "Found $COUNT shellcheck issues"
            echo "$ISSUES" | jq -r '.[] | "\(.file):\(.line):\(.column): \(.level) \(.code) - \(.message)"' | head -20
          else
            echo "No issues found"
          fi

      - name: Create tracking issue if problems found
        if: steps.check.outputs.count > 0
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const count = '${{ steps.check.outputs.count }}';

            // Check if there's already an open shellcheck issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'shellcheck,automated',
              state: 'open'
            });

            if (issues.length > 0) {
              console.log('Existing shellcheck issue found, skipping');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix: ${count} shellcheck warning(s) detected`,
              body: [
                '## ShellCheck Warnings',
                '',
                `Found **${count}** warning(s) in shell scripts.`,
                '',
                'Run locally to see details:',
                '```bash',
                'make lint',
                '```',
                '',
                '> This issue was created automatically. Assign to **Copilot** to auto-fix.',
                '',
                '_Generated by CI on ' + new Date().toISOString().split('T')[0] + '_'
              ].join('\n'),
              labels: ['shellcheck', 'automated']
            });

            console.log('✓ Created shellcheck issue');
