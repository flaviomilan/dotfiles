setw -g mouse on

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'

setw -g mode-keys vi

unbind-key C-b
set -g prefix C-a
bind-key C-a send-prefix

unbind [
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind | split-window -h
bind - split-window -v

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(n?vim)'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'


bind-key -T prefix l send-keys -R C-l \; clear-history
# Tmux 3.0+ version (simplified since you have 3.5a)
bind-key -n 'C-\\' if-shell "$is_vim" 'send-keys C-\\\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind N switch-client -l

set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

set -g @continuum-restore 'on'
set -s escape-time 0
set -g base-index 1
set -g status-position top
setw -g pane-base-index 1
setw -g monitor-activity on
set -g visual-activity on
setw -g mouse on
set-option -g focus-events on
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session
set -g renumber-windows on   # renumber all windows when any window is closed
set -g history-limit 1000000 # increase history size (from 2,000)

bind-key "T" run-shell "sesh connect \"$(
	sesh list | fzf-tmux -p 55%,60% \
		--no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
		--bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
		--bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
		--bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""

run '~/.tmux/plugins/tpm/tpm'

# ====== TOKYO NIGHT THEME CONFIGURATION ======

# Tokyo Night Colors
set -g @theme_variation 'night'
set -g @theme_left_separator ''
set -g @theme_right_separator ''

# Configurações do Tokyo Night plugin
set -g @tokyo-night-tmux_window_id_style digital
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare

# Status bar visual aprimorado
set -g status-justify centre
set -g status-left-length 60
set -g status-right-length 60

# Status left: session name com ícone
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold]#{?client_prefix, 󰘳 , 󰋜 } #S #[fg=#7aa2f7,bg=#1a1b26]"

# Status right: informações úteis com ícones
set -g status-right "#[fg=#565f89,bg=#1a1b26]#[fg=#c0caf5,bg=#2a2e47] 󰃭 %d/%m #[fg=#7aa2f7,bg=#2a2e47]#[fg=#1a1b26,bg=#7aa2f7] 󰥔 %H:%M #[fg=#7aa2f7,bg=#1a1b26]"

# Window status format - abas bem definidas
setw -g window-status-format "#[fg=#565f89,bg=#1a1b26]#[fg=#565f89,bg=#2a2e47] #I #[fg=#9aa5ce]#W #[fg=#2a2e47,bg=#1a1b26]"
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7]#[fg=#1a1b26,bg=#7aa2f7,bold] #I #[fg=#1a1b26]#W #[fg=#7aa2f7,bg=#1a1b26]"

# Separação visual entre abas
setw -g window-status-separator ""

# Cores dos panes
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Message style
set -g message-style "fg=#7dcfff,bg=#1a1b26"
set -g message-command-style "fg=#7dcfff,bg=#1a1b26"

# Clock style
setw -g clock-mode-colour "#7aa2f7"

# ====== MELHORIAS VISUAIS EXTRAS ======

# Transparência e suavização

# Bordas mais suaves para os panes
set -g pane-border-lines single

# Highlight de atividade com cores Tokyo Night
setw -g window-status-activity-style "fg=#f7768e,bg=#24283b"
setw -g window-status-bell-style "fg=#ff9e64,bg=#24283b"

# Copy mode styling
setw -g mode-style "fg=#1a1b26,bg=#7aa2f7"

# Status interval mais rápido para updates suaves
set -g status-interval 1

# ====== CONFIGURAÇÕES DE ESTILO ADICIONAL ======

# Background mais elegante
set -g status-style "bg=#1a1b26,fg=#c0caf5,bold"

# Configurações já definidas acima - removidas duplicadas

# Deixa tmux preservar e atualizar variáveis importantes:
set -g update-environment "DISPLAY XAUTHORITY GPG_AGENT_INFO SSH_AUTH_SOCK GPG_TTY"

