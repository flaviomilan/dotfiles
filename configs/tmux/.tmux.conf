# ── TPM Plugins ─────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fcsonline/tmux-thumbs'

# ── Prefix ──────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ─────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 1000000
set -s escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
set -g detach-on-destroy off
set -g status-position top
set -g status-interval 5
setw -g mode-keys vi
setw -g aggressive-resize on

# ── Vi Copy Mode ────────────────────────────────────────────────
unbind [
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection

# Cross-platform clipboard: pbcopy (macOS) or wl-copy/xclip (Linux)
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'; \
   bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell "uname | grep -q Linux" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy 2>/dev/null || xclip -selection clipboard'; \
   bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy 2>/dev/null || xclip -selection clipboard'"
bind P paste-buffer

# ── Panes ───────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x kill-pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Pane nav in copy mode (vim-tmux-navigator handles normal mode)
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ── Windows ─────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind k kill-window

# Quick select (Alt+number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Cycle & reorder
bind -n M-Left  select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left  swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# ── Sessions ────────────────────────────────────────────────────
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind N switch-client -l

# ── Utilities ───────────────────────────────────────────────────
# Reload (works regardless of config location)
bind q source-file -q ~/.config/tmux/tmux.conf \; source-file -q ~/.tmux.conf \; display "Reloaded!"
# Clear screen (C-l is used by vim-tmux-navigator)
bind-key -T prefix l send-keys -R C-l \; clear-history
# Preserve env across sessions
set -g update-environment "DISPLAY XAUTHORITY GPG_AGENT_INFO SSH_AUTH_SOCK GPG_TTY"

# ── sesh (conditional — install with: go install github.com/joshmedeski/sesh@latest)
if-shell "command -v sesh" {
  bind-key "T" run-shell "sesh connect \"$(
    sesh list | fzf-tmux -p 55%,60% \
      --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
      --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
      --bind 'tab:down,btab:up' \
      --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
      --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
      --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
      --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
      --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
      --bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
  )\""
}

# ── Plugin Settings ─────────────────────────────────────────────
set -g @continuum-restore 'on'

# ── TPM Bootstrap (auto-install if missing) ─────────────────────
if-shell "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
